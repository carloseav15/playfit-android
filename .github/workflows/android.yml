name: Android

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PLAYFIT_SUPABASE_URL: ${{ secrets.PLAYFIT_SUPABASE_URL }}
      PLAYFIT_SUPABASE_ANON_KEY: ${{ secrets.PLAYFIT_SUPABASE_ANON_KEY }}
      PLAYFIT_API_BASE_URL: ${{ secrets.PLAYFIT_API_BASE_URL }}
      PLAYFIT_DEBUG_SUPABASE_URL: ${{ secrets.PLAYFIT_DEBUG_SUPABASE_URL }}
      PLAYFIT_DEBUG_SUPABASE_ANON_KEY: ${{ secrets.PLAYFIT_DEBUG_SUPABASE_ANON_KEY }}
      PLAYFIT_DEBUG_API_BASE_URL: ${{ secrets.PLAYFIT_DEBUG_API_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Unit tests
        run: ./gradlew testDebugUnitTest
      - name: Release lint
        run: ./gradlew lintRelease
      - name: Unsigned release bundle
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 == '' }}
        run: ./gradlew bundleRelease
      - name: Decode upload keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/playfit-upload.jks"
      - name: Signed release bundle
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          PLAYFIT_UPLOAD_STORE_FILE: ${{ runner.temp }}/playfit-upload.jks
          PLAYFIT_UPLOAD_STORE_PASSWORD: ${{ secrets.PLAYFIT_UPLOAD_STORE_PASSWORD }}
          PLAYFIT_UPLOAD_KEY_ALIAS: ${{ secrets.PLAYFIT_UPLOAD_KEY_ALIAS }}
          PLAYFIT_UPLOAD_KEY_PASSWORD: ${{ secrets.PLAYFIT_UPLOAD_KEY_PASSWORD }}
        run: ./gradlew bundleRelease
